# docker-compose.yml

networks:
  app-network:
    driver: bridge

services:
  # Go сервис (минимальный образ)
  go-scratch:
    build:
      context: ./go-service
      dockerfile: Dockerfile.scratch
    container_name: go-scratch-service
    ports:
      - "8080:8080"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    labels:
      - "service=go"
      - "optimization=scratch"

  # Go сервис (alpine)
  go-alpine:
    build:
      context: ./go-service
      dockerfile: Dockerfile
    container_name: go-alpine-service
    ports:
      - "8081:8080"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    labels:
      - "service=go"
      - "optimization=alpine"

  # Python сервис (оптимизированный)
  python-slim:
    build:
      context: ./python-service
      dockerfile: Dockerfile.slim
    container_name: python-slim-service
    ports:
      - "8000:8000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "service=python"
      - "optimization=slim"

  # Python сервис (обычный)
  python-regular:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: python-regular-service
    ports:
      - "8001:8000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "service=python"
      - "optimization=regular"

  # Rust сервис (минимальный)
  rust-alpine:
    build:
      context: ./rust-service
      dockerfile: Dockerfile.alpine
    container_name: rust-alpine-service
    ports:
      - "3000:3000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    labels:
      - "service=rust"
      - "optimization=alpine"

  # Rust сервис (стандартный)
  rust-regular:
    build:
      context: ./rust-service
      dockerfile: Dockerfile
    container_name: rust-regular-service
    ports:
      - "3001:3000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "/usr/local/bin/rust-service", "health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    labels:
      - "service=rust"
      - "optimization=regular"